<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body style="background-color:#ccf2ff; text-align:center; font-family:Arial;">

    <h1 style="color:blue;">Welcome User</h1>

    <!-- Image -->
    <img src="https://cdn-icons-png.flaticon.com/512/5087/5087579.png" 
         width="120" height="120"><br><br>

    <!-- Login Form -->
    <form action="LoginChecker" method="post">

        <table align="center" cellpadding="10" 
               style="background-color:white; border-radius:10px; padding:20px;">

            <tr>
                <td>Username :</td>
                <td>
                    <input type="text" name="username" 
                           placeholder="Enter username" required>
                </td>
            </tr>

            <tr>
                <td>Password :</td>
                <td>
                    <input type="password" name="password" 
                           placeholder="Enter password" required>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Login" 
                           style="background-color:blue; color:white; padding:5px 15px;">
                </td>
            </tr>

        </table>

    </form>

    <br>

    <!-- Registration Link -->
    <a href="Registration.jsp" style="color:red; font-size:18px;">
        New User? Register Here
    </a>

</body>
</html>
